<style>
  /* ─── BASE RESET & SETUP ─── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: #1a1a1a;
    background-image: radial-gradient(circle at center, #2e2e2e 0%, #111 100%);
    font-family: 'Lora', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    color: #332b26;
    user-select: none;
  }

  /* ─── HIDE ROTATE PROMPT FOREVER ─── */
  #rotate-prompt { display: none !important; }

  /* ─── THE MAGIC FIX: 3D BOOK CONTAINER ─── */
  .scene { 
    width: 1000px; 
    height: 600px; 
    flex-shrink: 0;
    perspective: 1500px; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    z-index: 10; 
    transform-origin: center;
    /* Default scaling for laptops and landscape mode */
    transform: scale(min(calc(95vw / 1000), calc(90vh / 600), 1));
  }
  .book { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }

  /* ─── GLOBAL NAVIGATION ARROWS (Default Left/Right) ─── */
  #global-controls {
    position: fixed; top: 50%; left: 0; width: 100%;
    display: flex; justify-content: space-between; padding: 0 3vw;
    transform: translateY(-50%); z-index: 9999; pointer-events: none; 
  }
  .global-arrow {
    pointer-events: auto; width: 60px; height: 60px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);
    color: #e6cc98; font-size: 1.8rem; display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(5px); transition: all 0.3s ease;
  }
  .global-arrow:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.1); color: #fff; }

  /* ─── PORTRAIT MODE: LETTERBOX & UP/DOWN ARROWS ─── */
  @media (orientation: portrait) {
    /* 1. Zoom the book out to perfectly fit the width of the phone */
    .scene {
      transform: scale(calc(96vw / 1000)) !important;
    }

    /* 2. Move the controls to the empty space above and below the book */
    #global-controls {
      flex-direction: column;
      height: 85vh; /* Stretch container from top to bottom */
      padding: 0;
      align-items: center;
      justify-content: space-between;
    }

    /* 3. Rotate the Left Arrow to point UP (Previous Page) */
    .global-arrow:first-child {
      transform: rotate(90deg);
    }
    .global-arrow:first-child:hover { transform: rotate(90deg) scale(1.1); color: #fff; }

    /* 4. Rotate the Right Arrow to point DOWN (Next Page) */
    .global-arrow:last-child {
      transform: rotate(90deg);
    }
    .global-arrow:last-child:hover { transform: rotate(90deg) scale(1.1); color: #fff; }
  }

  /* ─── THE PAGES ─── */
  .paper { position: absolute; width: 50%; height: 100%; top: 0; right: 0; transform-style: preserve-3d; transform-origin: left center; transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1); pointer-events: none; }
  .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background-color: #f5f0e6; pointer-events: auto; overflow: hidden; }
  .front { background: linear-gradient(to right, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 8%), #f5f0e6; }
  .back { transform: rotateY(180deg); background: linear-gradient(to left, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 8%), #f5f0e6; }
  .flipped { transform: rotateY(-180deg); }

  /* ─── MAGICAL LOCK SCREEN & ERROR SCREEN ─── */
  #lock-screen {
    position: fixed; inset: 0; 
    background: rgba(15, 15, 15, 0.95);
    backdrop-filter: blur(15px);
    z-index: 10000; display: flex; justify-content: center; align-items: center;
    text-align: center; color: #dfc28d; transition: opacity 1.5s ease, visibility 1.5s ease;
  }
  .lock-content {
    border: 1px solid rgba(223, 194, 141, 0.3); padding: 4rem; border-radius: 10px;
    background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 40px rgba(0,0,0,0.8);
    display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 500px;
  }
  .lock-content h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #e6cc98; margin: 10px 0; border: none; }
  .lock-content p { color: #a38c62; font-style: italic; margin-bottom: 2rem; font-size: 1.1rem; }
  
  #secret-key {
    background: transparent; border: none; border-bottom: 2px solid rgba(223, 194, 141, 0.5);
    color: #fff; font-size: 1.2rem; padding: 10px; width: 100%; text-align: center;
    font-family: 'Lora', serif; outline: none; transition: border-color 0.3s;
  }
  #secret-key:focus { border-color: #dfc28d; }
  #secret-key::placeholder { color: rgba(223, 194, 141, 0.4); }
  .lock-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  /* Error Screen Styles */
  #error-screen {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(50, 0, 0, 0.98); position: absolute; inset: 0; z-index: 10001;
  }
  #error-screen h1 { color: #e63946; font-size: 3rem; margin-bottom: 1rem; font-family: 'Playfair Display', serif; text-transform: uppercase; letter-spacing: 2px; }
  #error-screen p { color: #fdf8f2; font-size: 1.3rem; margin-bottom: 2.5rem; text-align: center; max-width: 80%; line-height: 1.6; }
  .reload-btn {
    background: transparent; border: 2px solid #e63946; color: #e63946; padding: 12px 30px;
    font-size: 1.2rem; cursor: pointer; border-radius: 5px; transition: all 0.3s;
    font-family: 'Lora', serif; text-transform: uppercase; letter-spacing: 1px;
  }
  .reload-btn:hover { background: #e63946; color: #fff; box-shadow: 0 0 15px rgba(230, 57, 70, 0.5); }

  /* ─── AMBIENT CANVAS (SNOW / STARS / RAIN / ICE / HEARTS) ─── */
  #ambient-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: opacity 1.5s ease-in-out; z-index: 1; }
  #ambient-canvas.active { opacity: 1; }

  /* ─── INNER PAGE LAYOUT ─── */
  .page-content { width: 100%; height: 100%; padding: 3rem; display: flex; flex-direction: column; position: relative; z-index: 2; }
  
  /* ─── COVER STYLING ─── */
  .cover-front { background-color: #2b3a42; color: #e6cc98; border: 8px solid #1f2a30; background-image: linear-gradient(to right, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 5%); }
  .cover-front .page-content { justify-content: center; align-items: center; text-align: center; }
  .cover-front h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-style: italic; font-weight: 400; line-height: 1.1; }
  .subtitle { font-size: 1rem; letter-spacing: 0.2em; text-transform: uppercase; color: #c4a977; margin-top: 1rem; }
  .inside-cover { background-color: #1f2a30; }

  /* ─── TYPOGRAPHY ─── */
  h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 400; color: #2c2520; margin-bottom: 0.3rem; }
  .date-label { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: #7a6e65; margin-bottom: 1.5rem; border-bottom: 1px solid #d6ccc0; padding-bottom: 0.5rem; }

  /* ─── INDEX PAGE ─── */
  .index-list { list-style: none; margin-top: 1rem; }
  .index-list li { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 1.2rem; cursor: pointer; border-bottom: 1px dotted #a3998f; padding-bottom: 5px; transition: all 0.3s; }
  .index-list li:hover { color: #a88444; border-bottom-color: #a88444; transform: translateX(5px); }

  /* ─── POLAROID PHOTO FRAME ─── */
  .polaroid-frame { background: #ffffff; padding: 15px 15px 25px 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: auto; max-width: 90%; transform: rotate(-2deg); position: relative; z-index: 2; }
  .polaroid-frame img { width: 100%; height: auto; max-height: 35vh; object-fit: cover; border: 1px solid #e0e0e0; }
  .polaroid-caption { font-family: 'Lora', serif; font-style: italic; font-size: 1.15rem; color: #4a4038; margin-top: 15px; text-align: center; line-height: 1.4; }

  /* ─── LONG PHOTO BOOTH STRIPS ─── */
  .photo-booth { background: #ffffff; padding: 10px 10px 20px 10px; box-shadow: 2px 5px 15px rgba(0,0,0,0.15); margin: 10px auto; position: relative; z-index: 5; }
  .photo-booth img { width: 100%; height: auto; max-height: 50vh; object-fit: cover; filter: grayscale(100%); display: block; background: #e0e0e0; }

  /* ─── RULED TEXT LINES ─── */
  .ruled-lines { flex-grow: 1; background: repeating-linear-gradient( transparent, transparent 31px, #d6ccc0 31px, #d6ccc0 32px ); line-height: 32px; font-size: 1.15rem; color: #2b3a42; padding-top: 2px; margin-bottom: 2rem; position: relative; z-index: 2; }
  .journal-text { font-family: 'Lora', serif; font-style: italic; color: #4a4038; font-size: 1.25rem; line-height: 32px; margin-top: 28px; }
  
  /* ─── EXTRA SPECIAL PROPOSAL PAGE STYLING ─── */
  .proposal-special { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 100%; margin: 0; padding: 2rem; border: 2px solid #dfc28d; background: radial-gradient(circle, #fdf8f2 0%, #f4e8d8 100%); position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); overflow: hidden; }
  .proposal-special::before, .proposal-special::after { content: "❀"; position: absolute; font-size: 1.5rem; color: #dfc28d; z-index: 5; }
  .proposal-special::before { top: 10px; left: 15px; }
  .proposal-special::after { bottom: 10px; right: 15px; }
  .proposal-special h2 { color: #a13d4b; font-size: 3.2rem; font-style: italic; border: none; margin-bottom: 0; position: relative; z-index: 5; text-shadow: 0 0 10px #fdf8f2; }
  .proposal-special .date-label { color: #b8935c; font-size: 1.3rem; border-bottom: none; letter-spacing: 2px; margin-bottom: 1rem; position: relative; z-index: 5; }
  .proposal-special .quote { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #6e4e4e; line-height: 1.6; margin-top: 0.5rem; margin-bottom: 0.5rem; font-style: italic; position: relative; z-index: 5; background: rgba(253, 248, 242, 0.6); padding: 5px 10px; border-radius: 10px; }
  
  /* Interactive Buttons */
  #btn-yes, #btn-no { background: #dfc28d; color: #1f2a30; border: none; padding: 8px 25px; font-family: 'Lora', serif; font-size: 1.1rem; font-weight: 600; border-radius: 5px; cursor: pointer; transition: transform 0.3s ease, background 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 5; position: relative; }
  #btn-yes:hover { background: #c4a977; transform: scale(1.05); }
  #btn-no { background: #e07a5f; color: #fff; transform-origin: center center; }
  
  .proposal-photo-frame { flex-grow: 1; width: 100%; border: 3px double #dfc28d; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #a13d4b; font-style: italic; font-size: 1.2rem; box-shadow: 0 5px 20px rgba(161, 61, 75, 0.1); position: relative; z-index: 2; padding: 1rem; max-height: 100%; overflow: hidden; }
  .proposal-photo-frame img { max-width: 100%; max-height: 35vh; width: auto; height: auto; object-fit: contain; border: 1px solid #f0e6d2; }

  /* ─── LINE ART SVGS & FILLERS ─── */
  .line-art { position: absolute; fill: none; z-index: 3; }
  .heart-deco { position: absolute; fill: #d4a373; opacity: 0.4; z-index: 1; }
  
  /* Lilies Decoration */
  .lily-deco { position: absolute; width: 110px; height: 110px; z-index: 0; opacity: 0.9; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.05)); }
  .lily-top-left { top: 1rem; left: 1rem; transform: rotate(-35deg); }
  .lily-bottom-left { bottom: 1rem; left: 1rem; transform: rotate(-135deg) scale(0.8); }
  .lily-top-right { top: 1rem; right: 1rem; transform: rotate(35deg) scale(0.9); }
  .lily-bottom-right { bottom: 1rem; right: 1rem; transform: rotate(145deg); }
  .lily-mid-right { top: 45%; right: 1rem; transform: rotate(85deg) scale(0.7); opacity: 0.7; }
  .lily-bottom-center { bottom: 0.5rem; left: 35%; transform: rotate(-170deg) scale(0.85); opacity: 0.6; }
  .lily-top-center { top: -1rem; left: 40%; transform: rotate(-15deg) scale(0.6); opacity: 0.5; }

  /* Position Adjustments & Color for Line Arts */
  .kissing-art { opacity: 0.85; }
  .bg-sketch-1 { width: 220px; top: 8%; right: 5%; transform: rotate(-10deg); left: auto; }
  .bg-sketch-2 { width: 180px; bottom: 8%; left: 5%; transform: rotate(15deg); right: auto; }
  .bg-sketch-3 { width: 200px; bottom: 12%; left: 5%; transform: rotate(5deg); right: auto; top: auto; }
  .bg-sketch-4 { width: 160px; top: 40%; right: 5%; transform: rotate(-20deg); left: auto; bottom: auto; }

  .umbrella-art { width: 130px; top: 3%; right: 5%; left: auto; opacity: 0.9; }
  .coffee-art { width: 110px; top: 3%; right: 5%; bottom: auto; opacity: 0.9; }
  .pizza-art { width: 130px; top: 5%; right: 5%; bottom: auto; opacity: 0.9; }
  .slide-art { width: 140px; bottom: 35%; left: 3%; top: auto; opacity: 0.9; }
  .glasses-art { width: 130px; bottom: 10%; left: 5%; right: auto; opacity: 0.9; }
  .burger-art { width: 140px; top: 5%; right: 8%; opacity: 0.9; }

  /* ─── WALL OF DRAWINGS (26th April) ─── */
  .all-drawings-bg { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; opacity: 0.55; }
  .mini-art { position: absolute; transform: scale(0.4); opacity: 0.7; }
  .mini-flower { position: absolute; opacity: 0.6; width: 45px; }
</style>
